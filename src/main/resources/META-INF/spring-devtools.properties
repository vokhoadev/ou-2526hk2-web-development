# Giữ Spring Data JPA trong base classloader để proxy JPA repository
# thấy được CrudMethodMetadata (tránh lỗi "not visible from class loader: 'app'" trên Java 17+).
restart.exclude.springdatajpa=spring-data-jpa-[\\w\\d-\\.]+\\.jar
restart.exclude.springdatacommons=spring-data-commons-[\\w\\d-\\.]+\\.jar
