# Profile: dev-mysql — Development với MySQL
# Bắt buộc: chạy MySQL trước (vd. docker compose up -d), nếu không sẽ lỗi "Communications link failure".
spring.datasource.url=jdbc:mysql://localhost:3306/springcode?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=10000&socketTimeout=30000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=springcode
spring.datasource.password=root
# Đợi DB sẵn sàng (ví dụ Docker MySQL đang khởi động)
spring.datasource.hikari.connection-timeout=20000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=false
